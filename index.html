<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ExpenseIQ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg1:#0f172a;--bg2:#1e1b4b;--card:rgba(255,255,255,.06);--border:rgba(255,255,255,.1);--text:#e2e8f0;--dim:#94a3b8;--accent:#818cf8;--green:#34d399;--red:#f87171;--orange:#fb923c}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,var(--bg1),var(--bg2));color:var(--text);min-height:100vh;overflow-x:hidden}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;backdrop-filter:blur(10px)}
/* PIN Screen */
#pin-screen{position:fixed;inset:0;z-index:100;background:linear-gradient(135deg,var(--bg1),var(--bg2));display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .4s,transform .4s}
#pin-screen.hide{opacity:0;transform:scale(1.1);pointer-events:none}
.pin-brand{font-size:28px;font-weight:700;background:linear-gradient(135deg,var(--accent),#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.pin-sub{color:var(--dim);font-size:13px;margin-bottom:32px}
.pin-dots{display:flex;gap:12px;margin-bottom:36px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--accent);transition:background .2s}
.pin-dot.filled{background:var(--accent)}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:12px}
.pin-btn{width:72px;height:72px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:24px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:background .15s}
.pin-btn:active{background:rgba(129,140,248,.3)}
.pin-error{color:var(--red);font-size:13px;margin-top:16px;min-height:20px}
/* App */
#app{display:none;padding-bottom:72px}
.top-bar{padding:12px 16px 8px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--accent),#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
/* Filters */
.filters{padding:0 16px;display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.filter-group{display:flex;background:var(--card);border-radius:10px;border:1px solid var(--border);overflow:hidden}
.fbtn{padding:8px 14px;font-size:12px;color:var(--dim);background:none;border:none;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;min-height:36px}
.fbtn.active{background:var(--accent);color:#fff;font-weight:600}
/* Tabs */
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(15,23,42,.95);backdrop-filter:blur(10px);border-top:1px solid var(--border);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.tab{flex:1;padding:8px 0 6px;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--dim);border:none;background:none;cursor:pointer;font-size:10px;-webkit-tap-highlight-color:transparent}
.tab.active{color:var(--accent)}
.tab svg{width:20px;height:20px}
/* Content */
.content{padding:8px 16px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{padding:14px}
.stat-label{font-size:11px;color:var(--dim);margin-bottom:4px}
.stat-val{font-size:20px;font-weight:700}
.stat-sub{font-size:11px;margin-top:2px}
.chart-wrap{position:relative;height:220px;margin:12px 0}
.chart-wrap.pie{height:240px}
.section-title{font-size:14px;font-weight:600;margin:16px 0 8px;color:var(--dim)}
/* Transaction list */
.tx-list{display:flex;flex-direction:column;gap:6px}
.tx-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:10px;background:var(--card);border:1px solid var(--border)}
.tx-name{font-size:13px;font-weight:500}
.tx-cat{font-size:11px;color:var(--dim)}
.tx-amt{font-size:14px;font-weight:600;color:var(--red)}
.tx-acct{font-size:10px;color:var(--dim)}
/* Insight cards */
.insight{padding:14px;margin-bottom:8px;border-left:3px solid var(--accent)}
.insight-title{font-size:13px;font-weight:600;margin-bottom:4px}
.insight-body{font-size:12px;color:var(--dim);line-height:1.5}
.insight.warn{border-left-color:var(--orange)}
.insight.good{border-left-color:var(--green)}
.tab-content{display:none}.tab-content.active{display:block}
.day-label{font-size:12px;color:var(--dim);margin:12px 0 6px;font-weight:600}
.empty{text-align:center;color:var(--dim);padding:40px 0;font-size:13px}
.compare-row{display:flex;gap:10px;margin-bottom:10px}
.compare-row .card{flex:1;text-align:center}
.compare-val{font-size:18px;font-weight:700;margin:4px 0}
.compare-label{font-size:11px;color:var(--dim)}
.budget-bar{height:8px;background:rgba(255,255,255,.1);border-radius:4px;margin:6px 0;overflow:hidden}
.budget-fill{height:100%;border-radius:4px;transition:width .5s}
</style>
</head>

function getData(){

}

 <div class="tx-list">${data.slice(0,8).map(txHTML).join('')}</div>`;
 const sortedCats=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
 makeChart('ch-dash-cat',{type:'bar',data:{labels:sortedCats.map(c=>c[0]),datasets:[{data:sortedCats.map(c=>c[1]),backgroundColor:sortedCats.map(c=>CATS_COLOR[c[0]]||'#94a3b8'),borderRadius:6,barThickness:24}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{callback:v=>fmt(v),color:'#94a3b8',font:{size:10}},grid:{color:'rgba(255,255,255,.05)'}},y:{ticks:{color:'#e2e8f0',font:{size:11}},grid:{display:false}}}}});
}
function renderDaily(data,byDate){
 const el=document.getElementById('tc-daily');
 const dates=Object.keys(byDate).sort();
 const totals=dates.map(d=>getTotal(byDate[d]));
 const labels=dates.map(d=>{const p=d.split('-');return `Mar ${+p[2]}`});
 el.innerHTML=`<div class="card"><div class="chart-wrap"><canvas id="ch-daily"></canvas></div></div>
 <div class="section-title">Transactions by Day</div><div id="daily-txlist"></div>`;
 const txlist=document.getElementById('daily-txlist');
 dates.reverse().forEach(d=>{
 const txs=byDate[d];const dn=new Date(d+'T00:00:00');
 const lbl=dn.toLocaleDateString('en-IN',{weekday:'short',month:'short',day:'numeric'});
 txlist.innerHTML+=`<div class="day-label">${lbl} — ${fmt(getTotal(txs))}</div><div class="tx-list">${txs.map(txHTML).join('')}</div>`;
 });
 makeChart('ch-daily',{type:'bar',data:{labels,datasets:[{data:totals,backgroundColor:'rgba(129,140,248,.7)',borderRadius:6,barThickness:dates.length>10?12:20}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>fmt(ctx.raw)}}},scales:{x:{ticks:{color:'#94a3b8',font:{size:9},maxRotation:45},grid:{display:false}},y:{ticks:{callback:v=>fmt(v),color:'#94a3b8',font:{size:10}},grid:{color:'rgba(255,255,255,.05)'}}}}});
}
function renderWeekly(data){
 const el=document.getElementById('tc-weekly');
 const weeks=[{label:'Week 1 (Mar 3-9)',start:'2026-03-03',end:'2026-03-09'},{label:'Week 2 (Mar 10-16)',start:'2026-03-10',end:'2026-03-16'},{label:'Week 3 (Mar 17-23)',start:'2026-03-17',end:'2026-03-23'},{label:'Week 4 (Mar 24-27)',start:'2026-03-24',end:'2026-03-27'}];
 const wData=weeks.map(w=>{const wd=data.filter(t=>t.d>=w.start&&t.d<=w.end);return{...w,total:getTotal(wd),cats:getCats(wd),data:wd}});
 const allCats=[...new Set(data.map(t=>t.c))].sort();
 el.innerHTML=`<div class="compare-row">${wData.map(w=>`<div class="card"><div class="compare-label">${w.label.split('(')[0]}</div><div class="compare-val">${fmt(w.total)}</div><div class="compare-label">${w.data.length} txns</div></div>`).join('')}</div>
 <div class="section-title">Weekly Comparison</div><div class="card"><div class="chart-wrap"><canvas id="ch-weekly"></canvas></div></div>
 <div class="section-title">Category by Week</div><div class="card"><div class="chart-wrap"><canvas id="ch-wcat"></canvas></div></div>`;
 makeChart('ch-weekly',{type:'bar',data:{labels:wData.map(w=>w.label.split('(')[0].trim()),datasets:[{data:wData.map(w=>w.total),backgroundColor:['rgba(129,140,248,.7)','rgba(52,211,153,.7)','rgba(251,146,60,.7)'],borderRadius:8,barThickness:48}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>fmt(ctx.raw)}}},scales:{x:{ticks:{color:'#e2e8f0'},grid:{display:false}},y:{ticks:{callback:v=>fmt(v),color:'#94a3b8'},grid:{color:'rgba(255,255,255,.05)'}}}}});
 const topCats=allCats.slice(0,6);
 makeChart('ch-wcat',{type:'bar',data:{labels:wData.map(w=>w.label.split('(')[0].trim()),datasets:topCats.map(c=>({label:c,data:wData.map(w=>w.cats[c]||0),backgroundColor:CATS_COLOR[c]||'#94a3b8',borderRadius:4}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#e2e8f0',font:{size:10},boxWidth:12}}},scales:{x:{stacked:true,ticks:{color:'#e2e8f0'},grid:{display:false}},y:{stacked:true,ticks:{callback:v=>fmt(v),color:'#94a3b8'},grid:{color:'rgba(255,255,255,.05)'}}}}});
}
function renderMonthly(data,total,cats){
 const el=document.getElementById('tc-monthly');
 const daysElapsed=new Date().getDate(),daysInMonth=31;
 const projected=Math.round(total/daysElapsed*daysInMonth);
 const sortedCats=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
 const merchants={};data.forEach(t=>{merchants[t.n]=(merchants[t.n]||0)+t.a});
 const topMerch=Object.entries(merchants).sort((a,b)=>b[1]-a[1]).slice(0,5);
 const budget=150000;const pct=Math.min(100,Math.round(total/budget*100));
 el.innerHTML=`<div class="stats-grid">
 <div class="card stat-card"><div class="stat-label">Month Total</div><div class="stat-val">${fmt(total)}</div></div>
 <div class="card stat-card"><div class="stat-label">Projected</div><div class="stat-val">${fmt(projected)}</div><div class="stat-sub" style="color:var(--orange)">by Mar 31</div></div>
 </div>
 <div class="card" style="margin-bottom:12px"><div class="stat-label">Budget: ${fmt(budget)}</div><div class="budget-bar"><div class="budget-fill" style="width:${pct}%;background:${pct>80?'var(--red)':pct>60?'var(--orange)':'var(--green)'}"></div></div><div style="font-size:11px;color:var(--dim)">${pct}% used (${fmt(budget-total)} remaining)</div></div>
 <div class="section-title">Category Split</div><div class="card"><div class="chart-wrap pie"><canvas id="ch-mpie"></canvas></div></div>
 <div class="section-title">Top Merchants</div><div class="tx-list">${topMerch.map(([n,a])=>`<div class="tx-item"><span class="tx-name">${n}</span><span class="tx-amt">${fmt(a)}</span></div>`).join('')}</div>`;
 makeChart('ch-mpie',{type:'doughnut',data:{labels:sortedCats.map(c=>c[0]),datasets:[{data:sortedCats.map(c=>c[1]),backgroundColor:sortedCats.map(c=>CATS_COLOR[c[0]]||'#94a3b8'),borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'55%',plugins:{legend:{position:'right',labels:{color:'#e2e8f0',font:{size:10},boxWidth:10,padding:8}},tooltip:{callbacks:{label:ctx=>ctx.label+': '+fmt(ctx.raw)}}}}});
}
function renderAI(data,total,cats){
 const el=document.getElementById('tc-ai');
 const sortedCats=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
 const grocerySpend=cats['Groceries']||0;const foodSpend=cats['Food Delivery']||0;
 const transferSpend=cats['Transfers']||0;const healthSpend=cats['Healthcare']||0;
 const daysElapsed=19;const dailyAvg=Math.round(total/daysElapsed);
 const projected=Math.round(total/daysElapsed*31);
 const insights=[
 {cls:'warn',title:'High Transfer Activity',body:`Transfers total ${fmt(transferSpend)} (${Math.round(transferSpend/total*100)}% of spending). Review if all transfers are essential. Consider setting a monthly transfer budget.`},
 {cls:'',title:'Healthcare Costs',body:`Healthcare spending is ${fmt(healthSpend)} this month, driven by Continental Hospital (₹16,659) and pharmacy visits. Consider health insurance review to reduce out-of-pocket costs.`},
 {cls:'good',title:'Groceries Analysis',body:`Grocery spend of ${fmt(grocerySpend)} across Blinkit, DMart, Zepto, Ratnadeep. You're averaging ${fmt(Math.round(grocerySpend/daysElapsed))}/day. Consolidating to fewer stores could save 10-15%.`},
 {cls:'warn',title:'Food Delivery Alert',body:`${fmt(foodSpend)} on food delivery (Swiggy, Zomato, Pista House). That's ~${fmt(Math.round(foodSpend/daysElapsed))}/day. Cooking 2 more meals/week could save ₹2,000-3,000/month.`},
 {cls:'',title:'Subscription Stack',body:`Subscriptions: Apple (₹8,700+₹389), Jio (₹911), Airtel (₹1,000), Zee (₹299), Bajaj (₹3). Review Apple subscription — it's the largest at ₹9,089. Consider if all are actively used.`},
 {cls:'good',title:'Monthly Projection',body:`At ${fmt(dailyAvg)}/day, you're projected to spend ${fmt(projected)} this month. ${projected>150000?'This exceeds a ₹1.5L budget. Reduce discretionary spending in the last 12 days.':'You\'re within a reasonable range. Maintain current spending patterns.'}`},
 {cls:'warn',title:'Savings Opportunity',body:`Top 3 savings levers: 1) Reduce transfers by 20% (save ~${fmt(Math.round(transferSpend*0.2))}), 2) Cut food delivery by 30% (save ~${fmt(Math.round(foodSpend*0.3))}), 3) Consolidate groceries (save ~₹1,500). Total potential: ${fmt(Math.round(transferSpend*0.2+foodSpend*0.3+1500))}/month.`}
 ];
 el.innerHTML=`<div class="section-title">AI Spending Insights</div>${insights.map(i=>`<div class="card insight ${i.cls}"><div class="insight-title">${i.title}</div><div class="insight-body">${i.body}</div></div>`).join('')}`;
}
function txHTML(t){
 return `<div class="tx-item"><div><div class="tx-name">${t.n}</div><div class="tx-cat">${t.c} · ${t.w==='Y'?'Yakub':'Wife'}</div></div><div style="text-align:right"><div class="tx-amt">${fmt(t.a)}</div></div></div>`;
}
// === INIT UI ===
function initUI(){
 // Account filter
 const af=document.getElementById('acct-filter');
 ['All','Yakub','Wife'].forEach(v=>{const b=document.createElement('button');b.className='fbtn'+(S.acct===v?' active':'');b.textContent=v;b.dataset.val=v;af.appendChild(b)});
 af.addEventListener('click',e=>{const b=e.target.closest('.fbtn');if(!b)return;S.acct=b.dataset.val;af.querySelectorAll('.fbtn').forEach(x=>x.classList.toggle('active',x.dataset.val===S.acct));render()});
 // Period filter
 const pf=document.getElementById('period-filter');
 [{l:'Today',v:'today'},{l:'This Week',v:'week'},{l:'This Month',v:'month'},{l:'All Time',v:'all'}].forEach(({l,v})=>{const b=document.createElement('button');b.className='fbtn'+(S.period===v?' active':'');b.textContent=l;b.dataset.val=v;pf.appendChild(b)});
 pf.addEventListener('click',e=>{const b=e.target.closest('.fbtn');if(!b)return;S.period=b.dataset.val;pf.querySelectorAll('.fbtn').forEach(x=>x.classList.toggle('active',x.dataset.val===S.period));render()});
 // Tabs
 const tabs=[{id:'dash',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>',label:'Home'},
 {id:'daily',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',label:'Daily'},
 {id:'weekly',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>',label:'Weekly'},
 {id:'monthly',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>',label:'Monthly'},
 {id:'ai',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>',label:'Insights'}];
 const bar=document.getElementById('tab-bar');const cont=document.getElementById('tab-contents');
 tabs.forEach(t=>{
 const btn=document.createElement('button');btn.className='tab'+(S.tab===t.id?' active':'');btn.dataset.id=t.id;btn.innerHTML=t.icon+'<span>'+t.label+'</span>';bar.appendChild(btn);
 const div=document.createElement('div');div.id='tc-'+t.id;div.className='tab-content content'+(S.tab===t.id?' active':'');cont.appendChild(div);
 });
 bar.addEventListener('click',e=>{const btn=e.target.closest('.tab');if(!btn)return;S.tab=btn.dataset.id;bar.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.id===S.tab));render()});
}
// === BOOT ===
initPin();initUI();
</script>
